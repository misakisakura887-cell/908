services:
  - type: web
    name: mirror-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/index.ts
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: mirror-db
          property: connectionString
      - key: REDIS_URL
        value: redis://red-placeholder:6379
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: mirror-db
    plan: free
    databaseName: mirror
    user: mirror
